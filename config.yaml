# config.yaml

paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  forecasts: "data/forecasts/"
  experiments: "experiments/"

# ---------------------------------------------------------------------------
# Data — sources, date range, train/test split, and panel definitions.
# Panels combine a target, transform, and geography/sector filters into a
# named dataset; both the experiment and trading stages reference panels by name.
# ---------------------------------------------------------------------------
data:
  # All prediction targets; excluded from feature engineering (never lagged or rolled).
  # Which target an experiment uses is set per-panel (see panels.<name>.target).
  targets: ["pce", "mrts"]
  date_col: "date"
  frequency: "MS"
  start_date: "2019-01-01"
  end_date: "2026-02-01"
  max_retries: 3
  sleep_between: 0.7
  train_end: "2024-01-01"
  test_start: "2025-07-01"

  sources:
    bea:
      type: "api"
      data_set: "NIPA"
      table_name: "T20805"     # NIPA: PCE monthly, not seasonally adjusted (T20804 = SA)
      line_number: 1           # Line 1 = total PCE
      series_name: "pce"
      frequency: "M"
      year: "ALL"
    
    # "series" keys are FRED series IDs; values are the column names used throughout the pipeline.
    # ingest.py fetches by ID and renames; all downstream code uses the snake_case names.
    fred:
      type: "api"
      series:
        # monetary
        FEDFUNDS:   "fed_funds_rate"          # Effective federal funds rate
        BAA10Y:     "credit_spread_baa"       # Moody's Baa - 10Y Treasury spread
        GS10:       "treasury_10y"            # 10-Year Treasury constant maturity rate
        # commodity
        DCOILWTICO: "crude_oil_wti"           # WTI crude oil spot price (daily → monthly)
        MHHNGSP:    "natural_gas_price"       # Henry Hub natural gas composite price
        IR:         "import_price_index"      # Import price index, all commodities
        # labor/consumer
        UNRATE:     "unemployment_rate"       # Civilian unemployment rate
        JTSQUR:     "jolts_quits_rate"        # JOLTS quits rate (total non-farm)
        W875RX1:    "real_disposable_income"  # Real disposable personal income per capita
        UMCSENT:    "consumer_sentiment"      # U of Michigan Consumer Sentiment
        STICKCPIM157SFRBATL:  "sticky_cpi"    # sticky cpi percent change
    fsbi:
      type: "csv"
      filename: "fsbi_raw.csv"        # Pre-downloaded, lives in data/raw/
      national_geo: "US"              # Geo value used when panel geography is null
    uscb:
      type: "api"
      category_code: "44000"   # NAICS 44-45: total retail trade
      data_type_code: "SM"     # Sales, Monthly (SM); E_SM = associated error estimates
      series_name: "mrts"
      seasonally_adj: "no"

  alignment:
    method: "ffill"                   # How to handle frequency mismatches
    max_fill_periods: 3               # Don't ffill more than N periods

  # Panel schema — each entry defines a named prediction task:
  #   <name>:
  #     target:           "pce" | "mrts"
  #     target_transform: null (level) | "mom" (month-over-month %) | "yoy" (year-over-year %)
  #     geography:        [<...>]
  #     sectors:          [<...>]
  #     subsectors:       [<...>]
  panels:
    pce_national:
      target: "pce"
      target_transform: null          
      geography: ["US"]               
      sectors: ["ALL"]                
      subsectors: ["ALL"]             
    pce_national_mom:
      target: "pce"
      target_transform: "mom"
      geography: ["US"]
      sectors: ["ALL"]
      subsectors: ["ALL"]
    pce_national_yoy:
      target: "pce"
      target_transform: "yoy"
      geography: ["US"]
      sectors: ["ALL"]
      subsectors: ["ALL"]
    mrts_national:
      target: "mrts"
      target_transform: null
      geography: ["US"]
      sectors: ["ALL"]
      subsectors: ["ALL"]
    mrts_national_mom:
      target: "mrts"
      target_transform: "mom"
      geography: ["US"]
      sectors: ["ALL"]
      subsectors: ["ALL"]
    mrts_national_yoy:
      target: "mrts"
      target_transform: "yoy"
      geography: ["US"]
      sectors: ["ALL"]
      subsectors: ["ALL"]

# ---------------------------------------------------------------------------
# Features — lag depths, rolling windows, and named feature subsets.
# Feature sets are glob-matched against post-build column names and referenced
# by name in the experiment grid to select inputs for each trial.
# ---------------------------------------------------------------------------
features:
  lags: [1, 3, 6, 12]
  rolling_windows: [3, 6, 12]
  growth_rates: true

  # Named feature subsets referenced by the experiment grid; values are fnmatch
  # globs matched against post-build column names. An empty list signals X=None.
  feature_sets:
    none: []                    # Pass X=None — for pure time-series models
    all_features: ["*"]         # Full feature matrix, unfiltered
    fsbi_lags:                  # FSBI-only: lags and rolling stats
      - "fsbi_*_lag*"
      - "fsbi_*_rollmean*"
      - "fsbi_*_rollstd*"
    macro_lags:                 # Lagged FRED macro series only (no FSBI)
      - "cpi_lag*"
      - "fed_funds_rate_lag*"
      - "gdp_lag*"
      - "consumer_sentiment_lag*"
      - "credit_spread_baa_lag*"
      - "treasury_10y_lag*"
      - "crude_oil_wti_lag*"
      - "real_disposable_income_lag*"
      - "unemployment_rate_lag*"
      - "jolts_quits_rate_lag*"
      - "natural_gas_price_lag*"
      - "import_price_index_lag*"
    fsbi_and_macro_lags:        # Union of fsbi_lags + macro_lags
      - "fsbi_*_lag*"
      - "fsbi_*_rollmean*"
      - "fsbi_*_rollstd*"
      - "cpi_lag*"
      - "fed_funds_rate_lag*"
      - "gdp_lag*"
      - "consumer_sentiment_lag*"
      - "credit_spread_baa_lag*"
      - "treasury_10y_lag*"
      - "crude_oil_wti_lag*"
      - "real_disposable_income_lag*"
      - "unemployment_rate_lag*"
      - "jolts_quits_rate_lag*"
      - "natural_gas_price_lag*"
      - "import_price_index_lag*"

# ---------------------------------------------------------------------------
# Transforms — scaling and differencing applied after feature construction,
# before model fitting.
# ---------------------------------------------------------------------------
transforms:
  scaling: "standard"                 # "standard", "minmax", or null
  differencing: 1                     # Order of differencing; 0 = none

# ---------------------------------------------------------------------------
# Forecasting — forecast horizons and walk-forward validation parameters.
# ---------------------------------------------------------------------------
forecasting:
  horizons: [1]            # Primary; extend to [1, 3, 6] for multi-step
  walk_forward_min_train: 36  # Minimum observations before first forecast

# ---------------------------------------------------------------------------
# Experiment grid — fully specifies every trial to run.
#
# Adding a new model, hyperparameter variant, feature set, or panel requires
# only a change here; no Python code changes needed.
#
# Schema per variant:
#   class:       Model class name (must exist in experiment._MODEL_REGISTRY)
#   name:        Optional display label — only for single-params variants
#   params:      Fixed constructor kwargs (mutually exclusive with param_grid)
#   param_grid:  Dict of {kwarg: [values]} — expanded into one trial per combo
#   feature_sets: List of feature set names from features.feature_sets above
# ---------------------------------------------------------------------------
experiment:
  panels:
    - pce_national_mom          # Primary target: PCE MoM %
    - mrts_national

  models:
    baseline:
      enabled: true
      variants:
        - class: NaiveForecaster
          feature_sets: [none]
        - class: MeanForecaster
          feature_sets: [none]

    timeseries:
      enabled: true
      variants:
        - class: ARIMAForecaster
          name: arima_110
          params: {order: [1, 1, 0]}
          feature_sets: [none]
        - class: ARIMAForecaster
          name: arima_111
          params: {order: [1, 1, 1]}
          feature_sets: [none]
        - class: ARIMAXForecaster
          name: arimax_111_fsbi
          params: {order: [1, 1, 1]}
          feature_sets: [fsbi_lags]
        - class: ARIMAXForecaster
          name: arimax_111_macro
          params: {order: [1, 1, 1]}
          feature_sets: [macro_lags]
        - class: ETSForecaster
          name: ets_add
          params: {trend: add, seasonal: null}
          feature_sets: [none]
        - class: ETSXForecaster
          name: est_x_holt_damped
          params: {trend: add, damped_trend: true}
          feature_sets: [fsbi_lags, macro_lags]
        - class: ThetaForecaster
          name: theta_nodeseas
          params: {deseasonalize: false}        # if target is MoM: {deseasonalize: false}
                                                # if target is level or YoY: {deseasonalize: true, periods: 12}
          feature_sets: [fsbi_lags, macro_lags]

    ml:
      enabled: true
      variants:
        - class: OLSForecaster
          feature_sets: [fsbi_lags, macro_lags]
        - class: RidgeForecaster
          param_grid:
            alpha: [0.01, 0.1, 1.0, 10.0, 100.0]
          feature_sets: [fsbi_lags, macro_lags, fsbi_and_macro_lags, all_features]
        - class: LassoForecaster
          param_grid:
            alpha: [0.001, 0.01, 0.1, 1.0]
          feature_sets: [fsbi_lags, all_features]
        - class: RandomForestForecaster
          param_grid:
            n_estimators: [100]
            max_depth: [3, 5, null]
            min_samples_leaf: [2, 5]
          feature_sets: [fsbi_lags, fsbi_and_macro_lags]
        - class: XGBoostForecaster
          param_grid:
            n_estimators: [100, 300]
            learning_rate: [0.01, 0.05]
            max_depth: [2, 3]
            subsample: [0.8]
            colsample_bytree: [0.8]
          feature_sets: [fsbi_lags, fsbi_and_macro_lags]
        - class: GradientBoostingForecaster
          param_grid:
            n_estimators: [100]
            learning_rate: [0.05, 0.1]
            max_depth: [2, 3]
          feature_sets: [fsbi_lags, fsbi_and_macro_lags]

# ---------------------------------------------------------------------------
# Trading stage — strategy selection, evaluation parameters, and market data.
# Set active_strategy to the key of the strategy to run. test_modes controls
# which evaluation methods run; include both for a backtest/MC sanity check.
# ---------------------------------------------------------------------------
trading:
  enabled: true
  active_strategy: "pce_pairs"   # Key of strategy to run from strategies dict below
  test_modes: ["backtest"]         # "backtest" | "monte_carlo" | both

  # Evaluation environment — shared across all strategies
  portfolio:
    initial_cash: 100000
    commission: 0.002         # equity strategies: per-trade cost as fraction of turnover
    contract_value: 100.0     # prediction market strategies: notional value per contract
    bid_ask_spread: 0.02      # prediction market strategies: spread cost per contract

  monte_carlo:
    model: "gbm"
    n_paths: 500
    random_seed: 42
    drift_mode: "historical"          # "historical", "zero", "risk_free"
    lookback_days: 252
    risk_free_column: null            # optional explicit column if already in macro data
    save_path_details: true

  sensitivity_analysis:
    enabled: true
    noise_sigmas: [0.0, 0.1, 0.2, 0.5, 1.0, 2.0]
    n_trials: 50
    random_seed: 42

  market_data:
    source: "yfinance"                # only invoked when a strategy declares tickers
    refresh: false

  strategies:
    consumer_regime:
      class: "ConsumerRegimeStrategy"
      # Maps role names the strategy expects → panel names from data.panels.
      # Role names are strategy-defined; check the strategy class for required_inputs.
      forecast_panels:
        primary: "pce_national_mom"   # feeds strategy input "forecasts"
        mrts: "mrts_national"         # feeds strategy input "mrts"
      # Pins a specific model/feature_set for each panel; keys match forecast_panels values.
      # Set both fields to null to auto-select by lowest RMSE from experiment results.
      selected_model:
        pce_national_mom:
          model_name: null
          feature_set: null
        mrts_national:
          model_name: null
          feature_set: null
      forecastex:
        enabled: false
      params:
        ticker: "XLY"
        bullish_threshold: 0.75
        bearish_threshold: -0.75
        pce_weight: 0.6
        mrts_weight: 0.4
        target_allocation: 0.25
        risk_on_ticker: "XLY"
        defensive_ticker: "XLP"

    mrts_event:
      class: "MRTSForecastMarketStrategy"
      # Role "primary" maps to the panel whose forecasts are compared against Bloomberg consensus.
      forecast_panels:
        primary: "mrts_national"      # feeds strategy input "forecasts"
      # Set both fields to null to auto-select by lowest RMSE from experiment results.
      selected_model:
        mrts_national:
          model_name: null
          feature_set: null
      forecastex:
        enabled: true
      params:
        bloomberg_csv_path: "data/raw/bbg_mrts.csv"
        model_rmse: 0.15
        edge_threshold: 0.15
        contract_price: 0.50

    adaptive_regime:
      class: AdaptiveRegimeStrategy
      forecast_panels:
        primary: "pce_national_mom" 
      selected_model:
        pce_national_mom:
          model_name: null
          feature_set: null
        mrts_national:
          model_name: null
          feature_set: null
      forecastex:
        enabled: false
      params:
        trend_window: 3
        z_window: 4
        uncertainty_window: 3
        risk_on_gap_z: 0.1
        risk_on_delta_z: 0.0
        defensive_gap_z: 0.0
        duration_gap_z: -0.05
        falling_delta_z: -0.2
        ambiguous_band: 0.05
        uncertainty_ratio_thresh: 2.0
        top_k: 1
        min_abs_mom: 0.0
        use_ma_filter: false
        target_allocation: 1.0
        sscore_w_3m: 1.0
        score_w_6m: 0.0
        score_w_12m: 0.0
        score_w_vol: 0.15
        fallback_etf: QUAL
        risk_on_basket: [XLY, XRT, PEJ, AMZN, BKNG, TSLA]
        defensive_basket: [XLP, XLV, XLU, USMV, QUAL]
        duration_basket: [TLT, IEF, XLP, XLU, XLV]
        uncertain_basket: [QUAL, USMV, XLV, XLP, GLD]
        top_k: 2
  
    pce_pairs:
      class: "PCEPairsStrategy"
      forecast_panels:
        primary: "pce_national_mom"
      selected_model:
        pce_national_mom:
          model_name: null
          feature_set: null
      forecastex:
        enabled: false
      params:
        # asset pair
        ticker_a: "WMT"   # consumer discretionary WMT | XLY
        ticker_b: "TGT"   # consumer staples TGT | XLP 
        # macro signal
        macro_threshold: 0.0    # pce must exceed abs(magnitude) to register a regime; higher requires stronger signal
        # spread and z-score
        zscore_window: 20   # trading days rolling window for z-score computation
        entry_z: 1.5  # |z| threshold to open a position
        exit_z: 0.8   # |z| threshold to close a position (mean reversion)
        # dollar-neutral position sizing
        position_size: 0.5   # long leg weight; short leg gets -position_size
visualization:
  top_k_forecast_models: 5
  mape_comparison_panels:
    - pce_national_mom
    - mrts_national

logging:
  level: "INFO"
